<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Brief | SoulThread Syndicate</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/responsive.css?v=3.0">
  <style>
    .request-page {
      background: radial-gradient(circle at top, #0b1423 0%, #060b13 100%);
      min-height: 100vh;
      padding: 60px 20px;
      display: flex;
      justify-content: center;
    }
    .form-container {
      background: rgba(11, 20, 35, 0.9);
      backdrop-filter: blur(20px);
      border: 2px solid var(--raptr-blue);
      border-radius: 25px;
      padding: 50px;
      width: 100%;
      max-width: 800px;
      box-shadow: 0 0 50px rgba(0, 132, 255, 0.15);
    }
    .form-header { text-align: center; margin-bottom: 40px; }
    .form-header h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; }
    .form-header p { color: var(--raptr-cyan); font-weight: 800; font-size: 0.9rem; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
    .form-group { display: flex; flex-direction: column; gap: 10px; }
    .form-group.full-width { grid-column: span 2; }
    
    label { font-size: 0.75rem; font-weight: 800; color: var(--raptr-muted); text-transform: uppercase; letter-spacing: 1px; }
    input, select, textarea {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      transition: 0.3s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--raptr-cyan); outline: none; box-shadow: 0 0 15px rgba(0, 255, 255, 0.1); }
    
    .file-upload {
      border: 2px dashed rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }
    .file-upload:hover { border-color: var(--raptr-blue); background: rgba(0, 132, 255, 0.05); }
    .file-upload i { font-size: 2rem; color: var(--raptr-cyan); margin-bottom: 15px; }

    .submit-btn {
      width: 100%;
      padding: 20px;
      background: var(--raptr-blue);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 900;
      font-size: 1.1rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(0, 132, 255, 0.3);
    }
    .submit-btn:hover { background: var(--raptr-cyan); color: #000; box-shadow: 0 0 40px var(--raptr-cyan); transform: translateY(-5px); }
  </style>
</head>
<body class="request-page">

  <div class="form-container">
    <div style="text-align: left; margin-bottom: 20px;">
      <a href="commissions.html" style="color: var(--raptr-muted); font-size: 0.85rem;"><i class="fas fa-arrow-left"></i> Back to Commissions</a>
    </div>

    <div class="form-header">
      <h1>SUBMIT YOUR BRIEF</h1>
      <p>ESTABLISH CONNECTION WITH THE SYNDICATE ARTISTS</p>
    </div>

    <form id="briefForm">
      <div class="form-grid">
        <div class="form-group">
          <label>SERVICE TYPE</label>
          <select id="serviceType" required>
            <option value="art">Full Character Illustration</option>
            <option value="apparel">Custom Tactical Hoodie</option>
            <option value="other">Other Creative Project</option>
          </select>
        </div>
        <div class="form-group">
          <label>ESTIMATED BUDGET (RS)</label>
          <input type="number" placeholder="e.g. 15000" required>
        </div>
        <div class="form-group full-width">
          <label>TELL US YOUR VISION (BRIEF)</label>
          <textarea rows="6" placeholder="Describe your character, style, fabric preferences, or any specific details..." required></textarea>
        </div>
        <div class="form-group full-width">
          <label>REFERENCE IMAGES / MOODBOARD</label>
          <div class="file-upload">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>DRAG & DROP OR CLICK TO UPLOAD REFERENCES</p>
            <span style="font-size: 0.7rem; color: var(--raptr-muted);">SUPPORTED: JPG, PNG, PDF (MAX 10MB)</span>
          </div>
        </div>
        <div class="form-group">
          <label>CONTACT EMAIL</label>
          <input type="email" placeholder="agent@soulthread.com" required>
        </div>
        <div class="form-group">
          <label>DISCORD ID (OPTIONAL)</label>
          <input type="text" placeholder="username#0000">
        </div>
      </div>

      <button type="submit" class="submit-btn">TRANSMIT BRIEF TO SYNDICATE</button>
    </form>
  </div>

  <script>
    document.getElementById('briefForm').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Brief Transmission Successful! A syndicate agent will contact you shortly.');
      window.location.href = 'commissions.html';
    });
  </script>
</body>
</html>
