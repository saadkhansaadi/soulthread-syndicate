<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cyber Soul (Heart-shaped circuit) -->
  <path d="M50 85C50 85 15 65 15 40C15 25 25 15 40 15C45 15 50 20 50 20C50 20 55 15 60 15C75 15 85 25 85 40C85 65 50 85 50 85Z" stroke="#8B5CF6" stroke-width="3" stroke-dasharray="4 2"/>
  
  <!-- The Thread (Digital Line) -->
  <path d="M50 10V90" stroke="#3B82F6" stroke-width="2" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
  </path>
  
  <!-- Glowing Nodes -->
  <circle cx="50" cy="20" r="3" fill="#10B981">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="50" r="4" fill="#8B5CF6">
    <animate attributeName="r" values="3;5;3" dur="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="80" r="3" fill="#3B82F6">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" delay="0.5s" />
  </circle>

  <!-- Glitch Overlay (Hidden by default, used for animation) -->
  <rect x="10" y="45" width="80" height="2" fill="#F43F5E" opacity="0" class="logo-glitch-bar">
    <animate attributeName="opacity" values="0;0.8;0" dur="0.2s" repeatCount="indefinite" />
  </rect>
</svg>
